env:
  PG_JITTER_VERSION: "0.3.1"
  PG_JITTER_RELEASE: "1"
  PG_VERSIONS: "14 15 16 17 18"

steps:
  # ============================================================
  #  RPM Packages
  # ============================================================
  - group: ":package: RPM Packages"
    steps:
      - label: ":redhat: Rocky 8"
        command: bash .buildkite/scripts/build-rpm.sh
        env: { DISTRO_TAG: el8 }
        plugins:
          - docker#v5.11.0:
              image: rockylinux:8
              propagate-environment: true
        agents: { queue: x86_64 }
        artifact_paths: ["output/*.rpm"]

      - label: ":redhat: Rocky 9"
        command: bash .buildkite/scripts/build-rpm.sh
        env: { DISTRO_TAG: el9 }
        plugins:
          - docker#v5.11.0:
              image: rockylinux:9
              propagate-environment: true
        agents: { queue: x86_64 }
        artifact_paths: ["output/*.rpm"]

      - label: ":fedora: Fedora 39"
        command: bash .buildkite/scripts/build-rpm.sh
        env: { DISTRO_TAG: fc39 }
        plugins:
          - docker#v5.11.0:
              image: fedora:39
              propagate-environment: true
        agents: { queue: x86_64 }
        artifact_paths: ["output/*.rpm"]

      - label: ":fedora: Fedora 40"
        command: bash .buildkite/scripts/build-rpm.sh
        env: { DISTRO_TAG: fc40 }
        plugins:
          - docker#v5.11.0:
              image: fedora:40
              propagate-environment: true
        agents: { queue: x86_64 }
        artifact_paths: ["output/*.rpm"]

  # ============================================================
  #  DEB Packages
  # ============================================================
  - group: ":package: DEB Packages"
    steps:
      - label: ":ubuntu: Ubuntu 22.04"
        command: bash .buildkite/scripts/build-deb.sh
        env: { DISTRO_CODENAME: jammy }
        plugins:
          - docker#v5.11.0:
              image: ubuntu:22.04
              propagate-environment: true
        agents: { queue: x86_64 }
        artifact_paths: ["output/*.deb"]

      - label: ":ubuntu: Ubuntu 24.04"
        command: bash .buildkite/scripts/build-deb.sh
        env: { DISTRO_CODENAME: noble }
        plugins:
          - docker#v5.11.0:
              image: ubuntu:24.04
              propagate-environment: true
        agents: { queue: x86_64 }
        artifact_paths: ["output/*.deb"]

      - label: ":debian: Debian 11"
        command: bash .buildkite/scripts/build-deb.sh
        env: { DISTRO_CODENAME: bullseye }
        plugins:
          - docker#v5.11.0:
              image: debian:11
              propagate-environment: true
        agents: { queue: x86_64 }
        artifact_paths: ["output/*.deb"]

      - label: ":debian: Debian 12"
        command: bash .buildkite/scripts/build-deb.sh
        env: { DISTRO_CODENAME: bookworm }
        plugins:
          - docker#v5.11.0:
              image: debian:12
              propagate-environment: true
        agents: { queue: x86_64 }
        artifact_paths: ["output/*.deb"]

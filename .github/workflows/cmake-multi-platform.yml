name: Build

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04          # Linux x86_64
          - ubuntu-24.04-arm      # Linux ARM64
          - macos-15              # macOS ARM64 (Apple Silicon)
          - windows-2022          # Windows x86_64
          - windows-11-arm        # Windows ARM64
        backends:
#          - "sljit"
#          - "asmjit"
#          - "mir"
#          - "sljit;asmjit"
#          - "sljit;mir"
#          - "asmjit;mir"
          - "sljit;asmjit;mir"

    runs-on: ${{ matrix.os }}
    name: "${{ matrix.os }} — ${{ matrix.backends }}"

    env:
      PGPORT: "5432"

    steps:
      - uses: actions/checkout@v4

      # ---- Install PostgreSQL ----
      - name: Install PostgreSQL (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-17 postgresql-server-dev-17
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"

      - name: Install PostgreSQL (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          brew install postgresql@17
          echo "/opt/homebrew/opt/postgresql@17/bin" >> "$GITHUB_PATH"

      - name: Install PostgreSQL (Windows)
        if: startsWith(matrix.os, 'windows')
        shell: bash
        run: |
          choco install postgresql17 --params '/Password:postgres' -y --no-progress
          echo "C:/Program Files/PostgreSQL/17/bin" >> "$GITHUB_PATH"

      # ---- Clone dependencies ----
      - name: Clone sljit
        if: contains(matrix.backends, 'sljit')
        uses: actions/checkout@v4
        with:
          repository: zherczeg/sljit
          path: deps/sljit

      - name: Clone AsmJIT
        if: contains(matrix.backends, 'asmjit')
        uses: actions/checkout@v4
        with:
          repository: asmjit/asmjit
          path: deps/asmjit

      - name: Clone MIR
        if: contains(matrix.backends, 'mir')
        uses: actions/checkout@v4
        with:
          repository: vladich/mir-patched
          path: deps/mir

      # ---- Configure & Build ----
      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: |
          CMAKE_ARGS="-DPG_JITTER_BACKENDS=${{ matrix.backends }}"

          if [[ "${{ matrix.backends }}" == *sljit* ]]; then
            CMAKE_ARGS="$CMAKE_ARGS -DSLJIT_DIR=${{ github.workspace }}/deps/sljit"
          fi
          if [[ "${{ matrix.backends }}" == *asmjit* ]]; then
            CMAKE_ARGS="$CMAKE_ARGS -DASMJIT_DIR=${{ github.workspace }}/deps/asmjit"
          fi
          if [[ "${{ matrix.backends }}" == *mir* ]]; then
            CMAKE_ARGS="$CMAKE_ARGS -DMIR_DIR=${{ github.workspace }}/deps/mir"
          fi

          pg_config --version
          cmake -B build -DPG_CONFIG="$(command -v pg_config)" $CMAKE_ARGS

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          CMAKE_ARGS="-DPG_JITTER_BACKENDS=${{ matrix.backends }}"

          if [[ "${{ matrix.backends }}" == *sljit* ]]; then
            CMAKE_ARGS="$CMAKE_ARGS -DSLJIT_DIR=${{ github.workspace }}/deps/sljit"
          fi
          if [[ "${{ matrix.backends }}" == *asmjit* ]]; then
            CMAKE_ARGS="$CMAKE_ARGS -DASMJIT_DIR=${{ github.workspace }}/deps/asmjit"
          fi
          if [[ "${{ matrix.backends }}" == *mir* ]]; then
            CMAKE_ARGS="$CMAKE_ARGS -DMIR_DIR=${{ github.workspace }}/deps/mir"
          fi

          pg_config.exe --version
          cmake -B build -G "MinGW Makefiles" -DPG_CONFIG="$(command -v pg_config.exe)" $CMAKE_ARGS

      - name: Build
        run: cmake --build build --parallel

      # ---- Install into PG ----
      - name: Install pg_jitter (Unix)
        if: runner.os != 'Windows'
        run: |
          PKGLIBDIR="$(pg_config --pkglibdir)"
          echo "Installing to $PKGLIBDIR"
          sudo cp build/pg_jitter*.so "$PKGLIBDIR/" 2>/dev/null || true
          sudo cp build/pg_jitter*.dylib "$PKGLIBDIR/" 2>/dev/null || true
          ls "$PKGLIBDIR"/pg_jitter*

      - name: Install pg_jitter (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          PKGLIBDIR="$(pg_config --pkglibdir)"
          echo "Installing to $PKGLIBDIR"
          cp build/pg_jitter*.dll "$PKGLIBDIR/" 2>/dev/null || true
          ls "$PKGLIBDIR"/pg_jitter*

      # ---- Start PostgreSQL ----
      - name: Start PostgreSQL (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          # Use the cluster auto-started by the postgresql-17 package
          PGDATA=$(sudo -u postgres psql -t -A -c "SHOW data_directory;" 2>/dev/null || echo "/var/lib/postgresql/17/main")

          # Configure jit_provider
          echo "jit_provider = 'pg_jitter'" | sudo tee -a "$PGDATA/postgresql.conf"
          sudo pg_ctlcluster 17 main restart

          # Create test database
          sudo -u postgres createdb test
          echo "PostgreSQL ready on port $PGPORT"

      - name: Start PostgreSQL (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          PGDATA=/tmp/pg_jitter_ci
          initdb -D "$PGDATA" --no-locale
          echo "jit_provider = 'pg_jitter'" >> "$PGDATA/postgresql.conf"
          echo "port = $PGPORT" >> "$PGDATA/postgresql.conf"
          pg_ctl -D "$PGDATA" start -l "$PGDATA/logfile" -w
          sleep 1
          createdb test
          echo "PostgreSQL ready on port $PGPORT"

      - name: Start PostgreSQL (Windows)
        if: startsWith(matrix.os, 'windows')
        shell: bash
        run: |
          # Windows choco install starts PG automatically
          net stop postgresql-x64-17 2>/dev/null || true
          echo "jit_provider = 'pg_jitter'" >> "C:/Program Files/PostgreSQL/17/data/postgresql.conf"
          net start postgresql-x64-17
          sleep 2
          createdb -U postgres test
          echo "PostgreSQL ready on port $PGPORT"

      # ---- Test ----
      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: |
          FIRST_BACKEND=$(echo "${{ matrix.backends }}" | tr ';' '\n' | head -1)

          PSQL_CMD="psql -d test"
          if [[ "${{ matrix.os }}" == ubuntu* ]]; then
            PSQL_CMD="sudo -u postgres psql -d test"
          fi

          $PSQL_CMD -c "
            SET jit = on;
            SET jit_above_cost = 0;
            SET jit_inline_above_cost = 0;
            SET jit_optimize_above_cost = 0;
            SET pg_jitter.backend = '$FIRST_BACKEND';
            SELECT sum(i), avg(i), count(*) FROM generate_series(1, 10000) i;
          "
          $PSQL_CMD -c "
            SET jit = on;
            SET jit_above_cost = 0;
            SET pg_jitter.backend = '$FIRST_BACKEND';
            EXPLAIN (ANALYZE, COSTS OFF, SUMMARY ON)
            SELECT i % 100 AS bucket, sum(i), avg(i)
            FROM generate_series(1, 100000) i
            GROUP BY bucket
            ORDER BY bucket;
          " | tail -5

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          FIRST_BACKEND=$(echo "${{ matrix.backends }}" | tr ';' '\n' | head -1)
          psql -U postgres -d test -c "
            SET jit = on;
            SET jit_above_cost = 0;
            SET jit_inline_above_cost = 0;
            SET jit_optimize_above_cost = 0;
            SET pg_jitter.backend = '$FIRST_BACKEND';
            SELECT sum(i), avg(i), count(*) FROM generate_series(1, 10000) i;
          "

      # ---- Cleanup ----
      - name: Stop PostgreSQL (macOS)
        if: startsWith(matrix.os, 'macos') && always()
        run: pg_ctl -D /tmp/pg_jitter_ci stop -m fast 2>/dev/null || true

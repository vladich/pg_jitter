name: "Trigger Travis CI (ppc64le + s390x)"
on:
  push:
    branches: [master]
    paths-ignore: ['**.md', 'LICENSE', '.gitignore', 'tests/**', 'img/**', 'bench/**']
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build on Travis CI'
        required: false
        default: ''

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Travis CI build
        env:
          TRAVIS_API_TOKEN: ${{ secrets.TRAVIS_API_TOKEN }}
        run: |
          BRANCH="${{ github.event.inputs.branch || github.ref_name }}"
          echo "Triggering Travis CI on branch: $BRANCH"
          response=$(curl -sf -X POST \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -H "Travis-API-Version: 3" \
            -H "Authorization: token ${TRAVIS_API_TOKEN}" \
            -d "{\"request\":{\"branch\":\"${BRANCH}\",\"message\":\"Triggered by GitHub Actions (${BRANCH}) commit ${GITHUB_SHA::8}\"}}" \
            "https://api.travis-ci.com/repo/vladich%2Fpg_jitter/requests")
          echo "$response" | jq .
          echo "$response" | jq -e '.request.id' > /dev/null

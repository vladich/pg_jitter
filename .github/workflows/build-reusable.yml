name: Reusable Build & Test

on:
  workflow_call:
    inputs:
      postgres-version:
        required: true
        type: string
      os:
        required: true
        type: string

jobs:
  build:
    runs-on: ${{ inputs.os }}

    steps:
      - uses: actions/checkout@v4

      # ---- PostgreSQL: running server + pg_config on PATH ----
      - name: Setup PostgreSQL
        uses: ikalnytskyi/action-setup-postgres@v8
        with:
          postgres-version: "${{ inputs.postgres-version }}"
        id: postgres

      # Ubuntu: action provides server but not dev headers
      - name: Install PostgreSQL dev headers (Ubuntu)
        if: startsWith(inputs.os, 'ubuntu')
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-server-dev-${{ inputs.postgres-version }}

      # macOS: PG headers include <libintl.h> which comes from gettext
      - name: Install gettext (macOS)
        if: startsWith(inputs.os, 'macos')
        run: |
          brew install gettext
          echo "GETTEXT_INCLUDE=-I$(brew --prefix gettext)/include" >> "$GITHUB_ENV"

      - name: Verify pg_config
        shell: bash
        run: |
          pg_config --version
          echo "includedir-server: $(pg_config --includedir-server)"
          echo "includedir:        $(pg_config --includedir)"
          echo "pkglibdir:         $(pg_config --pkglibdir)"

      # ---- Clone dependencies ----
      - name: Clone sljit
        uses: actions/checkout@v4
        with:
          repository: vladich/sljit
          path: deps/sljit

      - name: Clone AsmJIT
        uses: actions/checkout@v4
        with:
          repository: asmjit/asmjit
          path: deps/asmjit

      - name: Clone MIR
        uses: actions/checkout@v4
        with:
          repository: vladich/mir-patched
          path: deps/mir

      - name: Clone StringZilla
        uses: actions/checkout@v4
        with:
          repository: ashvardanian/StringZilla
          path: deps/stringzilla

      # ---- PCRE2 (Unicode-aware regex/LIKE with JIT) ----
      - name: Clone PCRE2
        if: runner.os != 'Windows'
        uses: actions/checkout@v4
        with:
          repository: PCRE2Project/pcre2
          path: deps/pcre2
          submodules: true

      - name: Cache PCRE2 build
        if: runner.os != 'Windows'
        id: cache-pcre2
        uses: actions/cache@v4
        with:
          path: deps/pcre2/build
          key: pcre2-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('deps/pcre2/CMakeLists.txt') }}

      - name: Build PCRE2
        if: runner.os != 'Windows' && steps.cache-pcre2.outputs.cache-hit != 'true'
        shell: bash
        run: |
          cd deps/pcre2
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DPCRE2_SUPPORT_JIT=ON \
            -DPCRE2_SUPPORT_UNICODE=ON \
            -DPCRE2_BUILD_PCRE2_8=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DPCRE2_BUILD_PCRE2GREP=OFF \
            -DPCRE2_BUILD_TESTS=OFF \
            -DPCRE2_STATIC_PIC=ON
          cmake --build . --target pcre2-8-static -j 2
          echo "PCRE2 library:"
          ls -la libpcre2-8.a

      # ---- Clone PostgreSQL source for regression tests ----
      # Pin to the exact minor version to avoid test expectation mismatches
      # (e.g., Homebrew may ship 17.8 while REL_17_STABLE is already at 17.9)
      - name: Determine PostgreSQL version tag
        id: pg_version
        shell: bash
        run: |
          PG_FULL=$(pg_config --version)
          # Extract e.g. "17.8" from "PostgreSQL 17.8 (Homebrew)"
          PG_VER=$(echo "$PG_FULL" | sed -E 's/PostgreSQL ([0-9]+\.[0-9]+).*/\1/')
          # Convert "17.8" → "REL_17_8"
          PG_TAG="REL_$(echo "$PG_VER" | tr '.' '_')"
          echo "pg_tag=$PG_TAG" >> "$GITHUB_OUTPUT"
          echo "PostgreSQL version: $PG_FULL → tag: $PG_TAG"

      - name: Clone PostgreSQL source
        uses: actions/checkout@v4
        with:
          repository: postgres/postgres
          ref: ${{ steps.pg_version.outputs.pg_tag }}
          path: postgres-src
          fetch-depth: 1

      # ---- MSVC environment (Windows) ----
      # Must come before build so cl.exe / link.exe are on PATH
      - name: Setup MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # ---- Build using build.sh / build.cmd ----
      - name: Build (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          EXTRA_ARGS="-DSLJIT_DIR=${{ github.workspace }}/deps/sljit"
          EXTRA_ARGS="$EXTRA_ARGS -DASMJIT_DIR=${{ github.workspace }}/deps/asmjit"
          EXTRA_ARGS="$EXTRA_ARGS -DMIR_DIR=${{ github.workspace }}/deps/mir"
          EXTRA_ARGS="$EXTRA_ARGS -DSTRINGZILLA_DIR=${{ github.workspace }}/deps/stringzilla"
          EXTRA_ARGS="$EXTRA_ARGS -DPCRE2_DIR=${{ github.workspace }}/deps/pcre2"
          if [[ -n "${GETTEXT_INCLUDE:-}" ]]; then
            EXTRA_ARGS="$EXTRA_ARGS -DCMAKE_C_FLAGS=$GETTEXT_INCLUDE -DCMAKE_CXX_FLAGS=$GETTEXT_INCLUDE"
          fi
          ./build.sh all $EXTRA_ARGS

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: build.cmd --pg-config "%ProgramFiles%\PostgreSQL\${{ inputs.postgres-version }}\bin\pg_config.exe" all -DSLJIT_DIR=${{ github.workspace }}\deps\sljit -DASMJIT_DIR=${{ github.workspace }}\deps\asmjit -DMIR_DIR=${{ github.workspace }}\deps\mir -DSTRINGZILLA_DIR=${{ github.workspace }}\deps\stringzilla

      # ---- Install pg_jitter using install.sh / install.cmd ----
      - name: Install pg_jitter (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: sudo ./install.sh --pg-config "$(command -v pg_config)" all

      - name: Install pg_jitter (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          REM MIR backend has pre-existing code-gen bugs on Windows — exclude it
          call install.cmd --pg-config "%ProgramFiles%\PostgreSQL\${{ inputs.postgres-version }}\bin\pg_config.exe" sljit
          call install.cmd --pg-config "%ProgramFiles%\PostgreSQL\${{ inputs.postgres-version }}\bin\pg_config.exe" asmjit

      # ---- Configure JIT and restart PostgreSQL ----
      - name: Configure and restart PostgreSQL
        shell: bash
        run: |
          CONNURI="${{ steps.postgres.outputs.connection-uri }}"
          PGDATA=$(psql -t -A -c "SHOW data_directory;" "$CONNURI")
          echo "PGDATA: $PGDATA"
          pg_ctl -D "$PGDATA" stop -m fast
          echo "jit_provider = 'pg_jitter'" >> "$PGDATA/postgresql.conf"
          echo "jit_above_cost = 0" >> "$PGDATA/postgresql.conf"
          echo "jit_inline_above_cost = 0" >> "$PGDATA/postgresql.conf"
          echo "jit_optimize_above_cost = 0" >> "$PGDATA/postgresql.conf"
          pg_ctl -D "$PGDATA" start -l "$PGDATA/logfile" -w
          sleep 1
          psql -c "SHOW jit_provider;" "$CONNURI"

      # ---- Build regression test shared libraries ----
      - name: Build regression test libraries
        if: runner.os != 'Windows'
        shell: bash
        run: |
          PGSRC="${{ github.workspace }}/postgres-src"
          DLPATH="$PGSRC/src/test/regress"
          INCSERVER="$(pg_config --includedir-server)"
          INC="$(pg_config --includedir)"

          # Sources: core regress helper + contrib/spi libraries used by the triggers test
          # refint.c needs -DREFINT_VERBOSE to emit NOTICE messages expected by triggers.out
          SOURCES="src/test/regress/regress.c contrib/spi/autoinc.c contrib/spi/refint.c contrib/spi/insert_username.c contrib/spi/moddatetime.c"

          cd "$PGSRC"
          for src in $SOURCES; do
            base=$(basename "$src" .c)
            EXTRA_CFLAGS=""
            if [[ "$base" == "refint" ]]; then
              EXTRA_CFLAGS="-DREFINT_VERBOSE"
            fi
            cc -fPIC -I"$INCSERVER" -I"$INC" ${GETTEXT_INCLUDE:-} $EXTRA_CFLAGS -c "$src" -o "$base.o"
            if [[ "$(uname)" == "Darwin" ]]; then
              cc -bundle -undefined dynamic_lookup "$base.o" -o "$DLPATH/$base.dylib"
              # Some PG versions on macOS use .so instead of .dylib
              cp "$DLPATH/$base.dylib" "$DLPATH/$base.so"
            else
              cc -shared "$base.o" -o "$DLPATH/$base.so"
            fi
          done
          echo "Built libraries:"
          ls "$DLPATH"/*.so "$DLPATH"/*.dylib 2>/dev/null || true

      - name: Build regression test libraries (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          PGSRC="${{ github.workspace }}/postgres-src"
          DLPATH="$PGSRC/src/test/regress"
          INCSERVER="$(cygpath -w "$(pg_config --includedir-server)")"
          INC="$(cygpath -w "$(pg_config --includedir)")"
          LIBDIR="$(cygpath -w "$(pg_config --libdir)")"
          # PG ships stub Unix headers (netinet/in.h, sys/socket.h, etc.) for MSVC
          INCWIN32="$(cygpath -w "$(pg_config --includedir-server)/port/win32")"
          INCMSVC="$(cygpath -w "$(pg_config --includedir-server)/port/win32_msvc")"

          SOURCES="src/test/regress/regress.c contrib/spi/autoinc.c contrib/spi/refint.c contrib/spi/insert_username.c contrib/spi/moddatetime.c"

          cd "$PGSRC"
          for src in $SOURCES; do
            base=$(basename "$src" .c)
            EXTRA_CFLAGS=""
            [[ "$base" == "refint" ]] && EXTRA_CFLAGS="/DREFINT_VERBOSE"
            # PG < 16 PG_FUNCTION_INFO_V1 does not add PGDLLEXPORT to the
            # function itself, so GetProcAddress can't find it.  Extract all
            # PG_FUNCTION_INFO_V1 names and pass /EXPORT: for each.
            EXPORTS=""
            for fn in $(sed -n 's/.*PG_FUNCTION_INFO_V1(\([^)]*\)).*/\1/p' "$src"); do
              EXPORTS="$EXPORTS /EXPORT:$fn"
            done
            # MSYS2_ARG_CONV_EXCL disables MSYS2 auto-conversion of /LD, /link etc. to paths
            MSYS2_ARG_CONV_EXCL="*" cl.exe /LD /DWIN32 \
              /I"$INCSERVER" /I"$INC" /I"$INCWIN32" /I"$INCMSVC" \
              $EXTRA_CFLAGS \
              "$(cygpath -w "$src")" \
              /Fe:"$(cygpath -w "$DLPATH/${base}.dll")" \
              /link "$LIBDIR\\postgres.lib" $EXPORTS
          done
          echo "Built libraries:"
          ls "$DLPATH"/*.dll 2>/dev/null || true

      # ---- Regression tests for each backend ----
      - name: Run regression tests
        shell: bash
        run: |
          CONNURI="${{ steps.postgres.outputs.connection-uri }}"
          PG_MAJOR="${{ inputs.postgres-version }}"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            # MIR backend has pre-existing code-gen bugs on Windows — skip it
            if [[ "$PG_MAJOR" -lt 17 ]]; then
              BACKENDS="sljit asmjit"
            else
              BACKENDS="sljit asmjit auto"
            fi
          elif [[ "$PG_MAJOR" -lt 17 ]]; then
            BACKENDS="sljit asmjit mir"
          else
            BACKENDS="sljit asmjit mir auto"
          fi
          REGRESS_DIR="${{ github.workspace }}/postgres-src/src/test/regress"
          PGPORT=$(psql -t -A -c "SHOW port;" "$CONNURI")

          # pg_regress and targeted pg_jitter tests spawn psql over TCP.
          # Be explicit: libpq otherwise defaults to the runner OS user.
          export PGUSER="postgres"
          export PGPASSWORD="postgres"

          # Find pg_regress (with or without .exe suffix)
          PG_REGRESS=""
          for candidate in \
            "$(pg_config --pkglibdir)/pgxs/src/test/regress/pg_regress" \
            "$(pg_config --pkglibdir)/pgxs/src/test/regress/pg_regress.exe" \
            "$(pg_config --bindir)/../lib/pgxs/src/test/regress/pg_regress" \
            "$(pg_config --bindir)/pg_regress" \
            "$(pg_config --bindir)/pg_regress.exe" \
            "/usr/lib/postgresql/${PG_MAJOR}/lib/pgxs/src/test/regress/pg_regress" \
          ; do
            if [ -f "$candidate" ]; then
              PG_REGRESS="$candidate"
              break
            fi
          done

          if [ -z "$PG_REGRESS" ]; then
            echo "ERROR: pg_regress not found"
            exit 1
          fi
          echo "Using pg_regress: $PG_REGRESS"

          # Cleanup function for state left by previous test runs
          cleanup_database() {
            psql -q -X "$CONNURI" <<'CLEANUP_SQL'
          DO $$ DECLARE r RECORD; BEGIN
              FOR r IN SELECT evtname FROM pg_event_trigger LOOP
                  EXECUTE format('DROP EVENT TRIGGER IF EXISTS %I CASCADE', r.evtname);
              END LOOP;
          END $$;
          DO $$ DECLARE r RECORD; BEGIN
              FOR r IN SELECT pubname FROM pg_publication LOOP
                  EXECUTE format('DROP PUBLICATION IF EXISTS %I CASCADE', r.pubname);
              END LOOP;
          END $$;
          DO $$ DECLARE r RECORD; BEGIN
              FOR r IN SELECT subname FROM pg_subscription LOOP
                  BEGIN
                      EXECUTE format('ALTER SUBSCRIPTION %I DISABLE', r.subname);
                      EXECUTE format('ALTER SUBSCRIPTION %I SET (slot_name = NONE)', r.subname);
                      EXECUTE format('DROP SUBSCRIPTION IF EXISTS %I', r.subname);
                  EXCEPTION WHEN OTHERS THEN NULL;
                  END;
              END LOOP;
          END $$;
          DO $$ DECLARE r RECORD; BEGIN
              FOR r IN SELECT srvname FROM pg_foreign_server LOOP
                  EXECUTE format('DROP SERVER IF EXISTS %I CASCADE', r.srvname);
              END LOOP;
          END $$;
          DO $$ DECLARE r RECORD; BEGIN
              FOR r IN SELECT nspname FROM pg_namespace
                       WHERE nspname NOT IN ('pg_catalog','information_schema','public')
                         AND nspname NOT LIKE 'pg_temp%'
                         AND nspname NOT LIKE 'pg_toast%' LOOP
                  EXECUTE format('DROP SCHEMA IF EXISTS %I CASCADE', r.nspname);
              END LOOP;
          END $$;
          SELECT format('DROP TABLESPACE IF EXISTS %I;', spcname)
          FROM pg_tablespace
          WHERE spcname NOT IN ('pg_default','pg_global')
          \gexec
          DO $$ DECLARE r RECORD; BEGIN
              FOR r IN SELECT rolname FROM pg_roles
                       WHERE rolname LIKE 'regress_%'
                         AND rolname NOT IN (SELECT usename FROM pg_stat_activity) LOOP
                  BEGIN
                      EXECUTE format('REASSIGN OWNED BY %I TO CURRENT_USER', r.rolname);
                      EXECUTE format('DROP OWNED BY %I', r.rolname);
                      EXECUTE format('DROP ROLE IF EXISTS %I', r.rolname);
                  EXCEPTION WHEN OTHERS THEN NULL;
                  END;
              END LOOP;
          END $$;
          CLEANUP_SQL
          }

          PGDATA=$(psql -t -A -c "SHOW data_directory;" "$CONNURI")

          # Show locale/collation info for debugging (datlocprovider added in PG15)
          psql -c "SELECT datcollate, datctype FROM pg_database WHERE datname = current_database();" "$CONNURI" || true

          # Enable core dumps and verbose logging for crash diagnosis
          if [ "$RUNNER_OS" = "Linux" ]; then
            ulimit -c unlimited 2>/dev/null || true
            echo '/tmp/core.%p' | sudo tee /proc/sys/kernel/core_pattern || true
            sudo apt-get install -y -qq gdb 2>/dev/null || true
          fi
          # Enable log_statement=all to see which query crashes
          echo "log_statement = 'all'" >> "$PGDATA/postgresql.auto.conf"
          echo "log_min_messages = 'INFO'" >> "$PGDATA/postgresql.auto.conf"
          pg_ctl -D "$PGDATA" restart -l "$PGDATA/logfile" -w || true

          PASSED=0
          FAILED=0
          RESULTS=""

          for backend in $BACKENDS; do
            echo "============================================"
            echo "  Regression tests: $backend"
            echo "============================================"

            # Ensure server is running (may have crashed from previous backend)
            if ! pg_isready -h localhost -p "$PGPORT" -q 2>/dev/null; then
              echo "  Server is down — restarting..."
              pg_ctl -D "$PGDATA" start -l "$PGDATA/logfile" -w || true
              sleep 2
            fi

            cleanup_database || true

            # Switch backend by writing to config and restarting.
            # PG14-PG16 use direct providers; PG17+ uses the meta provider
            # plus pg_jitter.backend, where "auto" is supported.
            grep -Ev '^(jit_provider|pg_jitter\.)' "$PGDATA/postgresql.auto.conf" > "$PGDATA/postgresql.auto.conf.tmp" || true
            mv "$PGDATA/postgresql.auto.conf.tmp" "$PGDATA/postgresql.auto.conf"
            if [ "$PG_MAJOR" -ge 17 ]; then
              echo "jit_provider = 'pg_jitter'" >> "$PGDATA/postgresql.auto.conf"
              echo "pg_jitter.backend = '$backend'" >> "$PGDATA/postgresql.auto.conf"
            else
              echo "jit_provider = 'pg_jitter_$backend'" >> "$PGDATA/postgresql.auto.conf"
            fi
            pg_ctl -D "$PGDATA" restart -l "$PGDATA/logfile" -w || true
            sleep 1

            echo "Active backend: $backend"

            BACKEND_CHECK_LOG="${{ github.workspace }}/regress-output-$backend/backend_check.log"
            mkdir -p "$(dirname "$BACKEND_CHECK_LOG")"
            BACKEND_SHOW_SQL=""
            if [ "$PG_MAJOR" -ge 17 ]; then
              BACKEND_SHOW_SQL="SHOW pg_jitter.backend;"
            fi
            set +e
            BACKEND_CHECK_OUTPUT=$(psql -X -v ON_ERROR_STOP=1 -c "
              SHOW jit_provider;
              $BACKEND_SHOW_SQL
              SET jit = on;
              SET jit_above_cost = 0;
              SET jit_inline_above_cost = 0;
              SET jit_optimize_above_cost = 0;
              SELECT SUM(i) FROM generate_series(1,1000) AS g(i) WHERE i > 10;
            " "$CONNURI" 2>&1)
            BACKEND_CHECK_RC=$?
            set -e
            printf '%s\n' "$BACKEND_CHECK_OUTPUT" > "$BACKEND_CHECK_LOG"
            if [ $BACKEND_CHECK_RC -ne 0 ] ||
               printf '%s\n' "$BACKEND_CHECK_OUTPUT" | grep -q 'invalid value for parameter "pg_jitter.backend"'; then
              echo "  => $backend: FAILED backend activation"
              cat "$BACKEND_CHECK_LOG"
              RESULTS="$RESULTS  $backend: FAILED backend activation\n"
              FAILED=$((FAILED + 1))
              continue
            fi

            # Save log position before tests so we can dump only new lines on failure
            LOG_OFFSET=0
            if [ -f "$PGDATA/logfile" ]; then
              LOG_OFFSET=$(wc -c < "$PGDATA/logfile" | tr -d ' ')
            fi

            # Quick sanity check — basic JIT query
            psql -c "SELECT 1+1 AS jit_test;" "$CONNURI" || echo "WARNING: basic JIT query failed for $backend"

            OUTDIR="${{ github.workspace }}/regress-output-$backend"
            mkdir -p "$OUTDIR"

            # PG 14 tablespace test uses @testtablespace@ placeholder
            # that expands to $OUTDIR/testtablespace — directory must exist
            mkdir -p "$OUTDIR/testtablespace"

            set +e
            "$PG_REGRESS" \
              --inputdir="$REGRESS_DIR" \
              --outputdir="$OUTDIR" \
              --bindir="$(pg_config --bindir)" \
              --dlpath="$REGRESS_DIR" \
              --schedule="$REGRESS_DIR/parallel_schedule" \
              --host=localhost \
              --port="$PGPORT" \
              --user=postgres \
              --dbname=regression > "$OUTDIR/pg_regress.log" 2>&1
            RC=$?
            set -e
            tail -50 "$OUTDIR/pg_regress.log"

            if [ $RC -eq 0 ]; then
              echo "  => $backend: PASSED"
              RESULTS="$RESULTS  $backend: PASSED (all tests)\n"
              PASSED=$((PASSED + 1))
            else
              FAIL_LINE=$(grep -E '[0-9]+ of [0-9]+ tests failed' "$OUTDIR/regression.out" 2>/dev/null | tail -1 || true)
              echo "  => $backend: FAILED — $FAIL_LINE"
              RESULTS="$RESULTS  $backend: FAILED — $FAIL_LINE\n"
              # Show which tests failed
              grep -E 'not ok|FAILED' "$OUTDIR/pg_regress.log" 2>/dev/null || true
              if [ -f "$OUTDIR/regression.diffs" ]; then
                echo "--- First 500 lines of regression.diffs ---"
                head -500 "$OUTDIR/regression.diffs"
              fi
              FAILED=$((FAILED + 1))

              # Dump crash-related log lines from this backend's run
              if [ -f "$PGDATA/logfile" ]; then
                echo "--- Crash/error lines from PostgreSQL server log ---"
                tail -c +"$((LOG_OFFSET + 1))" "$PGDATA/logfile" \
                  | grep -E 'PANIC|server process|was terminated|abnormal|terminated by|child process|exception|access violation|exit code [1-9]|signal [0-9]' \
                  | head -50 || true
                echo "--- pg_jitter unwind debug from server log ---"
                tail -c +"$((LOG_OFFSET + 1))" "$PGDATA/logfile" \
                  | grep -i 'pg_jitter.*unwind\|pg_jitter.*prologue\|pg_jitter.*parse\|pg_jitter.*bytes' \
                  | head -20 || true
                echo "--- Last 100 log lines from this backend ---"
                tail -c +"$((LOG_OFFSET + 1))" "$PGDATA/logfile" | tail -100 || true
              fi

              # Windows: check Application Event Log for crash entries
              if [ "$RUNNER_OS" = "Windows" ]; then
                echo "--- Windows Event Log (Application, last 20 errors) ---"
                timeout 10 powershell -NoProfile -Command "Get-WinEvent -FilterHashtable @{LogName='Application'; Level=2; StartTime=(Get-Date).AddMinutes(-10)} -MaxEvents 20 -ErrorAction SilentlyContinue | Format-List TimeCreated,ProviderName,Message" 2>/dev/null | head -60 || true
              fi

              # Get backtrace from core dumps (Linux)
              if [ "$RUNNER_OS" = "Linux" ]; then
                for corefile in /tmp/core.*; do
                  [ -f "$corefile" ] || continue
                  echo "--- Backtrace from $corefile ---"
                  PGBIN=$(pg_config --bindir)/postgres
                  gdb -batch -ex "thread apply all bt" "$PGBIN" "$corefile" 2>&1 | head -100
                  rm -f "$corefile"
                done
              fi

              # macOS crash reports
              if [ "$RUNNER_OS" = "macOS" ]; then
                for report in ~/Library/Logs/DiagnosticReports/postgres*; do
                  [ -f "$report" ] || continue
                  echo "--- Crash report: $(basename $report) ---"
                  head -80 "$report"
                done
              fi
            fi

            echo ""
          done

          if [ $FAILED -eq 0 ] && [ "$RUNNER_OS" != "Windows" ]; then
            echo "============================================"
            echo "  pg_jitter targeted regression tests"
            echo "============================================"

            PG_CONFIG_PATH="$(command -v pg_config)"
            TARGETED_FAILED=0

            for backend in $BACKENDS; do
              grep -Ev '^(jit_provider|pg_jitter\.)' "$PGDATA/postgresql.auto.conf" > "$PGDATA/postgresql.auto.conf.tmp" || true
              mv "$PGDATA/postgresql.auto.conf.tmp" "$PGDATA/postgresql.auto.conf"
              if [ "$PG_MAJOR" -ge 17 ]; then
                echo "jit_provider = 'pg_jitter'" >> "$PGDATA/postgresql.auto.conf"
                echo "pg_jitter.backend = '$backend'" >> "$PGDATA/postgresql.auto.conf"
              else
                echo "jit_provider = 'pg_jitter_$backend'" >> "$PGDATA/postgresql.auto.conf"
              fi
              pg_ctl -D "$PGDATA" restart -l "$PGDATA/logfile" -w || true
              sleep 1

              set +e
              ./tests/test_provider_regressions.sh \
                --pg-config "$PG_CONFIG_PATH" \
                --host localhost \
                --port "$PGPORT" \
                --db postgres \
                --backend "$backend"
              PROVIDER_RC=$?

              ./tests/test_function_surface.sh \
                --pg-config "$PG_CONFIG_PATH" \
                --host localhost \
                --port "$PGPORT" \
                --db postgres \
                --backend "$backend"
              SURFACE_RC=$?
              set -e

              if [ $PROVIDER_RC -ne 0 ]; then
                RESULTS="$RESULTS  $backend targeted provider regressions: FAILED\n"
                TARGETED_FAILED=$((TARGETED_FAILED + 1))
              else
                RESULTS="$RESULTS  $backend targeted provider regressions: PASSED\n"
              fi

              if [ $SURFACE_RC -ne 0 ]; then
                RESULTS="$RESULTS  $backend function surface regressions: FAILED\n"
                TARGETED_FAILED=$((TARGETED_FAILED + 1))
              else
                RESULTS="$RESULTS  $backend function surface regressions: PASSED\n"
              fi
            done

            if [ $TARGETED_FAILED -ne 0 ]; then
              FAILED=$((FAILED + TARGETED_FAILED))
            fi
          fi

          echo "============================================"
          echo "  SUMMARY"
          echo "============================================"
          printf "$RESULTS"
          echo ""
          echo "  $PASSED passed, $FAILED failed out of $(echo $BACKENDS | wc -w | tr -d ' ') backends"
          echo "============================================"

          [ $FAILED -eq 0 ]
